name: Build Debian package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dh-python python3-all python3-setuptools python3-build

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Create GitHub Release and upload .deb
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "WiFi-Nightmare $GITHUB_REF_NAME" \
            --notes "Automated build of WiFi-Nightmare $GITHUB_REF_NAME" \
            ../wifi-nightmare_*.deb

      - name: Update APT repository on gh-pages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Check out gh-pages branch (create if not exists)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -r . 2>/dev/null || true

          # Create APT repo structure
          mkdir -p pool/main/w/wifi-nightmare/
          mkdir -p dists/stable/main/binary-amd64/

          # Copy the .deb package
          cp ../wifi-nightmare_*.deb pool/main/w/wifi-nightmare/

          # Generate Packages metadata
          dpkg-scanpackages --multiversion pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cat > dists/stable/Release << RELEOF
          Origin: WiFi-Nightmare APT Repository
          Label: WiFi-Nightmare
          Suite: stable
          Codename: stable
          Date: $(date -Ru)
          Architectures: amd64
          Components: main
          Description: WiFi-Nightmare APT repository - Advanced WiFi Security Testing
          RELEOF

          # Commit and push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update APT repo: ${GITHUB_REF_NAME}"
          git push origin gh-pages --force
